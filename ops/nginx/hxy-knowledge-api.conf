server {
    listen 8088;
    server_name _;

    root /root/hxy/apps/admin-web;
    index index.html;

    access_log /var/log/nginx/hxy-knowledge-api.access.log;
    error_log /var/log/nginx/hxy-knowledge-api.error.log;

    client_max_body_size 11m;

    location = / {
        return 302 /startup.html;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location = /api/v1/onboarding/invites/redeem {
        client_max_body_size 1k;
        proxy_pass http://127.0.0.1:18081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:18081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://127.0.0.1:18081/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
