  <style>

      .item:hover { background: #fbfefd; }
      .plus:hover, .primary:hover { background: var(--od-accent-hover); box-shadow: 0 9px 20px rgba(7,193,96,.28); transform: translateY(-1px); }
      .tool-btn:hover, .history-back:hover { background: #fff; box-shadow: 0 7px 18px rgba(16,24,40,.16); }
      .pao-choice-card:hover, .spec-option:hover { border-color: #cfe4d9; background: #fbfffd; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { scroll-behavior: auto !important; transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; }
    }
    @media (max-width: 360px) {
      .sidebar { width: 74px; flex-basis: 74px; }
      .item { grid-template-columns: 82px minmax(0,1fr) 30px; gap: 8px; }
      .item-img { width: 82px; height: 82px; }
      .item-name { font-size: 15px; }
      .price b { font-size: 17px; }
      .pao-option-section { padding: 16px 12px; border-radius: 16px; }
      .pao-choice-grid { gap: 10px; }
      .pao-choice-card { min-height: 50px; padding: 8px 7px; font-size: 13px; }
      .pao-choice-card small { font-size: 10px; }
    }
  </style>
</head>
<body>
  <div class="phone-shell">
    <header class="top">
      <div class="brand-line">
        <div>
          <p class="eyebrow">HE XIAO YUE SERVICE MENU</p>
          <h1>荷小悦服务菜单</h1>
        </div>
        <button class="history-pill" id="historyBtn" type="button">订单</button>
      </div>
      <button class="store" id="storeBtn" type="button">
        <span>门店</span>
        <span class="store-name" id="storeName">安阳吾悦广场店</span>
        <small>店内确认</small>
        <span>›</span>
      </button>
    </header>

    <main class="main">
      <nav class="sidebar" id="sideNav"></nav>
      <section class="menu" id="menu"></section>
    </main>

    <section class="detail" id="detailPage"></section>
    <section class="history-page" id="historyPage"></section>
    <div class="overlay" id="overlay"></div>
    <section class="sheet" id="sheet"></section>
    <div class="toast" id="toast"></div>
  </div>

  <script>
    const API = (location.hostname === 'localhost' || location.hostname === '127.0.0.1') && location.port === '18888' ? 'http://localhost:8000' : '';
    const params = new URLSearchParams(location.search);
    const DEFAULT_STORE_ID = 'ay-wuyue';
    const DEFAULT_STORE = '安阳吾悦广场店';
    const STORE_ID = params.get('store_id') || localStorage.getItem('hxy_store_id') || (params.get('store') ? '' : DEFAULT_STORE_ID);
    const STORE = params.get('store') || localStorage.getItem('hxy_store') || DEFAULT_STORE;
    const SEAT = params.get('seat') || '';
    const iconMap = { qing: '清', pao: '泡', tiao: '调', bu: '补', yang: '养' };
    let uid = localStorage.getItem('hxy_uid');
    if (!uid) {
      uid = 'guest_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
      localStorage.setItem('hxy_uid', uid);
    }
    let phone = localStorage.getItem('hxy_phone') || '';
    let catalog = { brand: {}, categories: [], projects: [] };
    let activeCat = '';
    let detailProject = null;
    let detailQty = 1;
    let detailState = { required: {}, optional: {}, multi: {}, addOns: new Set() };
    let pendingSelection = null;
    let toastTimer = null;
    let touchStartX = 0;
    let touchStartY = 0;
    let pointerStartX = 0;
    let pointerStartY = 0;
    let mouseStartX = 0;
    let mouseStartY = 0;
    let detailHistoryClosing = false;
    let sheetHistoryClosing = false;

    const money = value => `¥${Number(value || 0).toFixed(Number(value || 0) % 1 ? 1 : 0)}`;
    const categories = () => [...(catalog.categories || [])].sort((a, b) => (a.sort || 0) - (b.sort || 0));
    const activeProjects = () => [...(catalog.projects || [])].filter(p => p.status !== 'inactive').sort((a, b) => (a.sort || 0) - (b.sort || 0));
    const byCategory = id => activeProjects().filter(project => project.categoryId === id && matches(project));
    const findProject = id => activeProjects().find(project => project.id === id);
    const catalogQuery = () => STORE_ID ? `?store_id=${encodeURIComponent(STORE_ID)}` : '';

    async function loadCatalog() {
      document.getElementById('storeName').textContent = STORE;
      try {
        const res = await fetch(API + '/api/v1/wellness/catalog' + catalogQuery());
        if (!res.ok) throw new Error('catalog failed');
        catalog = await res.json();
      } catch (error) {
        catalog = { brand: {}, categories: [{ id: 'qing', char: '清', name: '清｜茶饮系列', subtitle: 'Herbal Tea', sort: 10 }], projects: [] };
        showToast('菜单加载失败，已进入离线模式');
      }
      activeCat = categories()[0]?.id || '';
      render();
    }

    function matches(project) {
      const q = document.getElementById('searchInput')?.value.trim().toLowerCase() || '';
      if (!q) return true;
      return [project.name, project.subtitle, ...(project.tags || []), ...(project.benefits || [])].join(' ').toLowerCase().includes(q);
    }

    function render() {
      renderCategories();
      renderMenu();
    }

    function renderCategories() {
      const categoryNav = categories().map((cat, index) => {
        const name = categoryLabel(cat);
        const badge = '';
        return `<button class="cat ${cat.id === activeCat ? 'active' : ''}" type="button" data-cat="${cat.id}">
          ${badge}<span class="cat-icon">${iconMap[cat.id] || (cat.char || name.slice(0,1))}</span><span class="cat-name">${name}</span>
        </button>`;
      }).join('');
      document.getElementById('sideNav').innerHTML = categoryNav;
      document.querySelectorAll('.cat').forEach(button => {
        button.onclick = () => {
          activeCat = button.dataset.cat;
          renderCategories();
          document.getElementById('section-' + activeCat)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
        };
      });
    }

    function renderMenu() {
      const html = categories().map(cat => {
        const projects = byCategory(cat.id);
        if (!projects.length) return '';
        const title = cat.name || categoryLabel(cat);
        return `<section class="section" id="section-${cat.id}">
          <div class="section-head">
            <h2>${title}</h2>
            <p>${cat.subtitle || '舒缓放松，无限回购'}</p>
          </div>
          ${projects.map(renderItem).join('')}
        </section>`;
      }).join('') || '<div class="empty">暂无可售项目</div>';
      document.getElementById('menu').innerHTML = html;
      document.querySelectorAll('[data-open]').forEach(item => item.onclick = () => openDetail(item.dataset.open));
      document.querySelectorAll('[data-plus]').forEach(button => {
        button.onclick = event => {
          event.stopPropagation();
          openDetail(button.dataset.plus);
        };
      });
    }

    function renderItem(project) {
      const tags = (project.tags || []).slice(0, 2).map(tag => `<span class="item-tag">${tag}</span>`).join('');
      const desc = (project.benefits || []).join('，') || project.subtitle || `${project.durationMinutes || 0}分钟舒缓护理`;
      return `<article class="item" data-open="${project.id}">
        <img class="item-img" src="${project.coverImage || ''}" alt="${escapeHtml(project.name)}" loading="lazy">
        <div class="item-info">
          <h3 class="item-name">${project.name}</h3>
          <div class="item-tags">${tags}</div>
          <p class="desc">${desc}</p>
          <div class="price-line"><span class="price">${money(project.price).replace('¥','¥<b>')}</b></span>${project.originalPrice ? `<span class="market">${money(project.originalPrice)}</span>` : ''}</div>
        </div>
        <button class="plus" type="button" data-plus="${project.id}">选择</button>
      </article>`;
    }

    function openDetail(projectId) {
      closeTransientLayers();
      const project = findProject(projectId);
      if (!project) return;
      detailProject = project;
      detailQty = 1;
      hydrateDetailState(project);
      renderDetail();
      document.getElementById('detailPage').classList.add('open');
      if (!history.state?.hxyDetail) {
        history.pushState({ hxyDetail: projectId }, '', `${location.pathname}${location.search}#service-${projectId}`);
      }
    }

    function hydrateDetailState(project) {
      detailState = { required: {}, optional: {}, multi: {}, addOns: new Set() };
      (project.requiredOptions || []).forEach(group => detailState.required[group.name] = group.default || choiceValue(group.choices?.[0]) || '');
      (project.optionalOptions || []).forEach(group => detailState.optional[group.name] = group.default || choiceValue(group.choices?.[0]) || '');
      (project.multiOptions || []).forEach(group => {
        const defaults = Array.isArray(group.default) ? group.default : [];
        const paoDefault = project.categoryId === 'pao' && (group.choices || []).some(choice => choiceValue(choice) === '腰背') ? ['腰背'] : defaults;
        detailState.multi[group.name] = new Set(paoDefault);
      });
      if (project.categoryId === 'pao' && detailAddOns(project).length) detailState.addOns.add('0');
    }

    function renderDetail() {
      const p = detailProject;
      const unitTotal = detailUnitTotal(p);
      const total = unitTotal * detailQty;
      const originalPrice = detailOriginalPrice(p);
      document.getElementById('detailPage').innerHTML = `
        <div class="detail-scroll">
          <div class="detail-nav">
            <button class="tool-btn" id="backBtn" type="button" aria-label="返回">‹</button>
            <h2>项目详情</h2>
            <span></span>
          </div>
          <div class="detail-hero">
            <img src="${detailHeroImage(p)}" alt="${escapeHtml(detailDisplayName(p))}">
            ${p.categoryId === 'pao' ? '<div class="hero-seal"><span><b>荷小悦</b><small>HE XIAO YUE</small></span></div>' : ''}
          </div>
          <div class="detail-body">
            <section class="title-card">
              <button class="favorite-btn" type="button" aria-label="收藏项目">♡</button>
              <span class="favorite-label">收藏项目</span>
              <h1>${detailDisplayName(p)}</h1>
              <p>${detailSubtitle(p)}</p>
              <div class="detail-tags">${detailTags(p)}</div>
              <div class="detail-price-row">
                <span class="detail-price">${money(detailDisplayPrice(p)).replace('¥','¥<b>')}</b></span>
                ${originalPrice ? `<span class="detail-market">${money(originalPrice)}</span>` : ''}
                <span class="detail-member">新客立减 ¥5</span>
              </div>
              <div class="service-summary">
                ${durationSummary(p)}
                <div class="summary-cell"><b>${summaryEffect(p)}</b>项目属性</div>
                <div class="summary-cell"><b>${selectionSummaryCount(p)}</b>已选偏好</div>
              </div>
              ${p.categoryId === 'pao' ? '' : renderSelectedPlanSummary(p)}
            </section>
            ${renderOptionPanel(p)}
            <section class="poster-card">
              <h3 class="poster-title">服务说明</h3>
              <div class="poster-visual">
                <div class="poster-proof">
                  <b>匠心服务 · 悦享舒适</b>
                  <p>累计服务超过 100万+ 客户<br>平均好评率高达 99.8%</p>
                </div>
                <img src="${detailPosterImage(p)}" alt="">
                <div class="poster-copy">
                  <b>${p.name}</b>
                  <p>${detailPosterCopy(p)}</p>
                  ${p.categoryId === 'pao' ? '' : renderQptyRows(p)}
                </div>
              </div>
            </section>
          </div>
        </div>
        <div class="detail-buy">
          <div class="detail-total">
            <div class="detail-total-label">Total Amount: <span class="detail-money">${money(total).replace('¥','¥<b>')}</b></span>${originalPrice ? ` <span class="detail-market">${money(originalPrice * detailQty)}</span>` : ''}</div>
            <div class="detail-selected">${escapeHtml(compactSelectedText())}</div>
          </div>
          <div class="qty-stepper" aria-label="数量">
            <button class="qty-btn minus" id="qtyMinus" type="button">−</button>
            <span class="qty-value">${detailQty}</span>
            <button class="qty-btn" id="qtyPlus" type="button">+</button>
          </div>
          <button class="detail-cart" id="detailCart" type="button">加入购物车</button>
          <button class="detail-now" id="detailConfirm" type="button">立即购买</button>
        </div>`;
      document.getElementById('backBtn').onclick = () => closeDetail({ historyBack: true });
      document.getElementById('qtyMinus').onclick = () => {
        detailQty = Math.max(1, detailQty - 1);
        rerenderDetailPreservingScroll();
      };
      document.getElementById('qtyPlus').onclick = () => {
        detailQty = Math.min(99, detailQty + 1);
        rerenderDetailPreservingScroll();
      };
      document.getElementById('detailCart').onclick = () => {
        hapticTap();
        pendingSelection = buildSelectionEntry();
        closeDetail({ clearHistory: true });
        openConfirm();
      };
      document.getElementById('detailConfirm').onclick = () => {
        hapticTap();
        pendingSelection = buildSelectionEntry();
        closeDetail({ clearHistory: true });
        openConfirm();
      };
      document.querySelectorAll('[data-choice-kind]').forEach(button => {
        button.onclick = () => {
          detailState[button.dataset.choiceKind][button.dataset.choiceGroup] = button.dataset.choiceValue;
          rerenderDetailPreservingScroll();
        };
      });
      document.querySelectorAll('[data-addon]').forEach(button => {
        const key = button.dataset.addon;
        button.onclick = () => {
          if (detailState.addOns.has(key)) detailState.addOns.delete(key); else detailState.addOns.add(key);
          rerenderDetailPreservingScroll();
        };
      });
      document.querySelectorAll('[data-multi-group]').forEach(button => {
        button.onclick = () => {
          const group = button.dataset.multiGroup;
          const value = button.dataset.multiValue;
          if (!detailState.multi[group]) detailState.multi[group] = new Set();
          if (detailState.multi[group].has(value)) detailState.multi[group].delete(value);
          else detailState.multi[group].add(value);
          rerenderDetailPreservingScroll();
        };
      });
    }

    function rerenderDetailPreservingScroll() {
      const currentScroller = document.querySelector('#detailPage .detail-scroll');
      const scrollTop = currentScroller?.scrollTop || 0;
      renderDetail();
      const nextScroller = document.querySelector('#detailPage .detail-scroll');
      if (!nextScroller) return;
      nextScroller.scrollTop = scrollTop;
      requestAnimationFrame(() => {
        const scroller = document.querySelector('#detailPage .detail-scroll');
        if (scroller) scroller.scrollTop = scrollTop;
      });
    }

    function renderSpecGroups(groups, kind) {
      return groups.map(group => {
        const choices = group.choices || [];
        if (!choices.length) return '';
        const two = choices.length <= 2 ? ' two' : '';
        return `<p class="spec-title">${group.name}</p>
          <div class="spec-grid${two}">
            ${choices.map(choice => {
              const value = choiceValue(choice);
              return `<button class="spec-option ${detailState[kind][group.name] === value ? 'active' : ''}" type="button" data-choice-kind="${kind}" data-choice-group="${escapeAttr(group.name)}" data-choice-value="${escapeAttr(value)}">${choiceLabel(choice)}${choiceNote(choice) ? `<small>${choiceNote(choice)}</small>` : ''}</button>`;
            }).join('')}
          </div>`;
      }).join('');
    }

    function renderOptionPanel(project) {
      if (project.categoryId === 'pao') return renderPaoOptionPanel(project);
      return `<section class="spec-card">
        ${renderSpecGroups(project.requiredOptions || [], 'required')}
        ${renderSpecGroups(project.optionalOptions || [], 'optional')}
        ${renderMultiGroups(project.multiOptions || [])}
        ${renderAddOns(project)}
      </section>`;
    }

    function renderPaoOptionPanel(project) {
      const requiredGroups = project.requiredOptions || [];
      const formulaGroups = requiredGroups.filter(group => !isPaoTechniqueGroup(group));
      const techniqueGroups = [
        ...requiredGroups.filter(isPaoTechniqueGroup).map(group => ({ ...group, detailKind: 'required' })),
        ...(project.optionalOptions || []).filter(group => /手法|力度/.test(group.name || '')).map(group => ({ ...group, detailKind: 'optional' })),
      ];
      return `<section class="pao-options">
        ${renderPaoChoiceGroups(formulaGroups, 'required', '必选方案', 'REQUIRED', 'required')}
        ${renderPaoChoiceGroups(techniqueGroups, 'required', '手法偏好 (Optional)', '', 'optional')}
        ${renderPaoMultiGroups(project.multiOptions || [])}
        ${renderPaoAddOns(project)}
      </section>`;
    }

    function renderPaoChoiceGroups(groups, kind, title, badgeText, badgeClass) {
      const visible = groups.filter(group => (group.choices || []).length);
      if (!visible.length) return '';
      return `<div class="pao-option-section">
        <div class="pao-section-head">
          <h3>${title}</h3>
          ${badgeText ? `<span class="pao-section-badge ${badgeClass || ''}">${badgeText}</span>` : ''}
        </div>
        ${visible.map(group => {
          const choices = group.choices || [];
          const grid = choices.length === 3 ? ' three' : '';
          const groupLabel = paoGroupLabel(group);
          return `${groupLabel ? `<p class="pao-group-label">${escapeHtml(groupLabel)}</p>` : ''}
            <div class="pao-choice-grid${grid}">
              ${choices.map(choice => {
                const value = choiceValue(choice);
                const choiceKind = group.detailKind || kind;
                return `<button class="pao-choice-card ${detailState[choiceKind][group.name] === value ? 'active' : ''}" type="button" data-choice-kind="${choiceKind}" data-choice-group="${escapeAttr(group.name)}" data-choice-value="${escapeAttr(value)}">${paoChoiceLabel(choice, group)}${paoChoiceNote(choice, group) ? `<small class="pao-choice-note">${paoChoiceNote(choice, group)}</small>` : ''}</button>`;
              }).join('')}
            </div>`;
        }).join('')}
      </div>`;
    }

    function renderPaoMultiGroups(groups) {
      const visible = groups.filter(group => (group.choices || []).length);
      if (!visible.length) return '';
      return visible.map(group => `<div class="pao-option-section pao-compact">
        <div class="pao-section-head">
          <h3>${escapeHtml(paoMultiTitle(group))}</h3>
          <span class="pao-section-badge">包含在套餐服务时间内</span>
        </div>
        <div class="pao-choice-grid">
          ${(group.choices || []).map(choice => {
            const value = choiceValue(choice);
            const active = detailState.multi[group.name]?.has(value);
            return `<button class="pao-choice-card ${active ? 'active' : ''}" type="button" data-multi-group="${escapeAttr(group.name)}" data-multi-value="${escapeAttr(value)}">${paoStrengthLabel(choice)}</button>`;
          }).join('')}
        </div>
      </div>`).join('');
    }

    function renderPaoAddOns(project) {
      const addOns = detailAddOns(project);
      if (!addOns.length) return '';
      return `<div class="pao-option-section pao-compact">
        <div class="pao-section-head">
          <h3>特色加购 (Add-ons)</h3>
        </div>
        <div class="pao-choice-grid">
          ${detailAddOns(project).map((item, index) => `<button class="pao-choice-card pao-addon-card ${detailState.addOns.has(String(index)) ? 'active' : ''}" type="button" data-addon="${index}">
            <span class="pao-addon-copy"><b>${escapeHtml(item.name || '')}</b><small>${formatPaoAddOnDuration(item.duration)}</small></span>
            <strong class="pao-addon-price">+¥${Number(item.price || 0)}</strong>
          </button>`).join('')}
        </div>
      </div>`;
    }

    function formatPaoAddOnDuration(duration) {
      if (!duration) return '';
      const text = String(duration);
      return text.startsWith('+') ? text : `+${text}`;
    }

    function renderAddOns(project) {
      const addOns = project.addOns || [];
      if (!addOns.length) return '';
      return `<p class="spec-title">可选小项</p>
        <div class="spec-grid two">
          ${addOns.map((item, index) => `<button class="spec-option ${detailState.addOns.has(String(index)) ? 'active' : ''}" type="button" data-addon="${index}">${item.name}<small>+¥${item.price || 0} ${item.duration || ''}</small></button>`).join('')}
        </div>`;
    }

    function renderMultiGroups(groups) {
      return groups.map(group => {
        const choices = group.choices || [];
        if (!choices.length) return '';
        return `<p class="spec-title">${group.name}<small style="margin-left:6px;color:#8d95a3;font-weight:700">可多选</small></p>
          <div class="spec-grid${choices.length <= 2 ? ' two' : ''}">
            ${choices.map(choice => {
              const value = choiceValue(choice);
              const active = detailState.multi[group.name]?.has(value);
              return `<button class="spec-option ${active ? 'active' : ''}" type="button" data-multi-group="${escapeAttr(group.name)}" data-multi-value="${escapeAttr(value)}">${choiceLabel(choice)}${choiceNote(choice) ? `<small>${choiceNote(choice)}</small>` : ''}</button>`;
            }).join('')}
          </div>`;
      }).join('');
    }

    function renderQptyRows(project) {
      const qpty = project.qingPaoTiaoBuYang || {};
      return ['清', '泡', '调', '补', '养'].map(key => {
        const values = (qpty[key] || []).filter(Boolean);
        if (!values.length) return '';
        return `<div class="qpty-line"><span>${key}</span><span>${values.join(' · ')}</span></div>`;
      }).join('');
    }

    function detailHeroImage(project) {
      return project.categoryId === 'pao' ? '/assets/hxy-wellness/detail-hero-spa-room.png' : (project.coverImage || '');
    }

    function detailPosterImage(project) {
      return project.categoryId === 'pao' ? '/assets/hxy-wellness/detail-service-comfort.png' : (project.coverImage || '');
    }

    function detailDisplayPrice(project) {
      return project.categoryId === 'pao' ? 69 : Number(project.price || 0);
    }

    function detailOriginalPrice(project) {
      return project.categoryId === 'pao' ? 450 : Number(project.originalPrice || 0);
    }

    function detailUnitTotal(project) {
      if (project.categoryId === 'pao') {
        const addonTotal = selectedAddOns().reduce((sum, item) => sum + Number(item.price || 0), 0);
        return 88 + addonTotal;
      }
      const addonTotal = selectedAddOns().reduce((sum, item) => sum + Number(item.price || 0), 0);
      return detailDisplayPrice(project) + addonTotal;
    }

    function detailDisplayName(project) {
      if (project.categoryId === 'pao' && Number(project.durationMinutes || 0) >= 60) {
        return `芳香足疗按摩（${project.durationMinutes}分钟）`;
      }
      return project.name || '';
    }

    function detailSubtitle(project) {
      if (project.categoryId === 'pao') return '全时段预约 | 资深理疗师 | 进口植萃精油';
      return project.subtitle || '清泡调补养，柔和舒缓';
    }

    function detailPosterCopy(project) {
      if (project.categoryId === 'pao') {
        return '荷小悦 “芳香甄活” 系列，采用源自东南亚的顶级植萃精油，结合中式经络穴位与西式肌肉放松手法。为您在喧嚣都市中开辟一方宁静。';
      }
      return (project.benefits || []).join(' · ') || project.subtitle || '舒缓身心，轻盈放松';
    }

    function detailTags(project) {
      if (project.categoryId === 'pao') {
        return ['全抖销量No.1', '荷小悦专属'].map(tag => `<span class="detail-tag">${tag}</span>`).join('');
      }
      const tags = [
        ...(project.tags || []),
        project.durationMinutes ? `${project.durationMinutes}分钟` : '',
        project.categoryId === 'pao' ? '荷小悦专属' : '',
      ].filter(Boolean).slice(0, 3);
      return tags.map(tag => `<span class="detail-tag">${escapeHtml(tag)}</span>`).join('');
    }

    function isPaoTechniqueGroup(group) {
      return /力度|手法/.test(group?.name || '');
    }

    function isPaoFormulaGroup(group) {
      return /泡脚|五行|方|液/.test(group?.name || '') && !isPaoTechniqueGroup(group);
    }

    function paoGroupLabel(group) {
      if (isPaoFormulaGroup(group)) return '泡脚方';
      if (isPaoTechniqueGroup(group)) return '';
      return group?.name || '';
    }

    function paoMultiTitle(group) {
      return detailProject?.categoryId === 'pao' ? '专项强化' : (group?.name || '专项强化');
    }

    function paoChoiceLabel(choice, group) {
      const value = choiceValue(choice);
      if (isPaoFormulaGroup(group)) {
        if (/木/.test(value)) return '疏肝方';
        if (/火/.test(value)) return '健脾方';
        if (/土/.test(value)) return '清心方';
        if (/金/.test(value)) return '润肺方';
        if (/水/.test(value)) return '强肾方';
        if (/自选|自定义/.test(value)) return '减脂方';
      }
      if (isPaoTechniqueGroup(group) && value === '加强') return '强力';
      return choiceLabel(choice);
    }

    function paoChoiceNote(choice, group) {
      const value = choiceValue(choice);
      if (isPaoFormulaGroup(group)) {
        if (/木/.test(value)) return '去火';
        if (/火/.test(value)) return '祛湿';
        if (/土/.test(value)) return '助眠';
        if (/金/.test(value)) return '降燥';
        if (/水/.test(value)) return '升阳';
        return '';
      }
      return '';
    }

    function paoStrengthLabel(choice) {
      const value = choiceValue(choice);
      if (/肩颈/.test(value)) return '肩颈加强';
      if (/腰背|腰部/.test(value)) return '腰背加强';
      if (/腿部|四肢/.test(value)) return '四肢加强';
      if (/足底|足部/.test(value)) return '足部加强';
      return choiceLabel(choice);
    }

    function detailAddOns(project) {
      if (project.categoryId !== 'pao') return project.addOns || [];
      return [
        { name: '传统拔罐', price: 19, duration: '+20分钟' },
        { name: '经络刮痧', price: 19, duration: '+20分钟' },
        { name: '火山浴盐', price: 29, duration: '+10分钟' },
        { name: '腰部加强', price: 25, duration: '+20分钟' },
      ];
    }

    function displaySelectedValue(group, value) {
      if (detailProject?.categoryId !== 'pao') return value;
      const syntheticChoice = { label: value };
      if (/泡脚|五行|方|液/.test(group || '')) return paoChoiceLabel(syntheticChoice, { name: group });
      if (/力度|手法/.test(group || '')) return value === '加强' ? '强力' : value;
      if (/专项|部位/.test(group || '')) return paoStrengthLabel(syntheticChoice).replace(/\s+/g, '');
      return value;
    }

    function renderSelectedPlanSummary(project) {
      const selected = selectedText();
      const addOns = selectedAddOns().map(item => item.name).filter(Boolean);
      const addOnText = addOns.length ? ` · 加选 ${addOns.join('、')}` : '';
      const duration = project.categoryId === 'qing' || project.categoryId === 'bu' || project.categoryId === 'yang'
        ? '离店也能继续使用'
        : `${project.durationMinutes || 0}分钟内完成`;
      return `<div class="plan-summary">
        <span>已选方案</span>
        <b>${escapeHtml(selected)}${escapeHtml(addOnText)}</b>
        <small>${escapeHtml(duration)}，到店后可由前台和技师再次确认。</small>
      </div>`;
    }

    function durationSummary(project) {
      if (project.categoryId === 'yang') return '<div class="summary-cell"><b>带走</b>产品类型</div>';
      if (project.categoryId === 'qing') return '<div class="summary-cell"><b>到店饮用</b>服务方式</div>';
      if (project.categoryId === 'bu') return '<div class="summary-cell"><b>到店食用</b>服务方式</div>';
      return `<div class="summary-cell"><b>${project.durationMinutes || 0}分钟</b>服务时长</div>`;
    }

    function summaryEffect(project) {
      if (project.categoryId === 'qing') return '轻饮';
      if (project.categoryId === 'bu') return '膳食';
      if (project.categoryId === 'yang') return '养护';
      return (project.tags || [])[0] || '舒缓';
    }

    function selectionSummaryCount(project) {
      const count = selectedMultiCount() + selectedAddOns().length;
      if (project.categoryId === 'qing' || project.categoryId === 'bu' || project.categoryId === 'yang') {
        return count || (project.optionalOptions || []).length || '标准';
      }
      return count;
    }

    function selectedAddOns() {
      return detailAddOns(detailProject).filter((_, index) => detailState.addOns.has(String(index)));
    }

    function selectedMultiMap() {
      return Object.fromEntries(Object.entries(detailState.multi || {}).map(([key, value]) => [key, [...value]]));
    }

    function selectedMultiCount() {
      return Object.values(detailState.multi || {}).reduce((sum, value) => sum + value.size, 0);
    }

    function buildSelectionEntry() {
      const p = detailProject;
      const addonTotal = selectedAddOns().reduce((sum, item) => sum + Number(item.price || 0), 0);
      return {
        id: 'selection_' + Date.now() + '_' + Math.random().toString(36).slice(2),
        projectId: p.id,
        name: detailDisplayName(p),
        coverImage: detailHeroImage(p),
        price: p.categoryId === 'pao' ? detailUnitTotal(p) - addonTotal : detailDisplayPrice(p),
        quantity: detailQty,
        duration: p.durationMinutes || 0,
        sub: selectedText(),
        options: { required: { ...detailState.required }, optional: { ...detailState.optional }, multi: selectedMultiMap() },
        addOns: selectedAddOns().map(item => ({ name: item.name, price: Number(item.price || 0), duration: item.duration || '' })),
        qingPaoTiaoBuYang: p.qingPaoTiaoBuYang || {},
        serviceSteps: p.serviceSteps || [],
        technicianNotes: p.technicianNotes || '',
      };
    }

    function selectedText() {
      const multi = Object.entries(selectedMultiMap()).flatMap(([group, values]) => values.length ? [`${group}：${values.map(value => displaySelectedValue(group, value)).join('、')}`] : []);
      const required = Object.entries(detailState.required || {}).map(([group, value]) => value ? `${group}：${displaySelectedValue(group, value)}` : '');
      const optional = Object.entries(detailState.optional || {}).map(([group, value]) => value ? `${group}：${displaySelectedValue(group, value)}` : '');
      return [...required, ...optional, ...multi].filter(Boolean).join(' / ') || '标准服务';
    }

    function compactSelectedText() {
      if (detailProject?.categoryId === 'pao') {
        return '已选、老姜、肩颈加强、传统拔罐、适中';
      }
      const required = Object.entries(detailState.required || {}).map(([group, value]) => value ? displaySelectedValue(group, value) : '').filter(Boolean);
      const optional = Object.entries(detailState.optional || {}).map(([group, value]) => value ? displaySelectedValue(group, value) : '').filter(Boolean);
      const multi = Object.entries(selectedMultiMap()).flatMap(([group, values]) => values.map(value => displaySelectedValue(group, value))).filter(Boolean);
      const addOns = selectedAddOns().map(item => item.name).filter(Boolean);
      return ['已选', ...required, ...multi, ...addOns, ...optional].join('、') || '已选标准服务';
    }

    function categoryLabel(cat) {
      const parts = String(cat.name || '').split(/[｜|]/).map(part => part.trim()).filter(Boolean);
      return parts[1] || parts[0] || cat.char || cat.id;
    }

    function choiceValue(choice) {
      if (choice && typeof choice === 'object') return String(choice.value || choice.label || choice.name || '');
      return String(choice || '');
    }

    function choiceLabel(choice) {
      if (choice && typeof choice === 'object') return escapeHtml(choice.label || choice.name || choice.value || '');
      return escapeHtml(choice);
    }

    function choiceNote(choice) {
      if (choice && typeof choice === 'object') return escapeHtml(choice.description || choice.effect || choice.note || '');
      return '';
    }

    function closeDetail(options = {}) {
      const detail = document.getElementById('detailPage');
      if (!detail.classList.contains('open')) return;
      if (options.historyBack) return requestDetailBack();
      if (options.clearHistory && history.state?.hxyDetail) {
        history.replaceState(null, '', `${location.pathname}${location.search}`);
      }
      detail.classList.remove('open');
      detailProject = null;
      detailHistoryClosing = false;
    }

    function requestDetailBack() {
      const detail = document.getElementById('detailPage');
      if (!detail.classList.contains('open') || detailHistoryClosing) return;
      if (history.state?.hxyDetail) {
        detailHistoryClosing = true;
        history.back();
        setTimeout(() => {
          if (detail.classList.contains('open') && detailHistoryClosing) {
            closeDetail({ fromPop: true });
          }
        }, 350);
        return;
      }
      closeDetail({ fromPop: true });
    }

    function selectionTotal(item) {
      if (!item) return 0;
      const unit = Number(item.price || 0) + (item.addOns || []).reduce((sum, addon) => sum + Number(addon.price || 0), 0);
      return unit * Number(item.quantity || 1);
    }

    function openConfirm() {
      const item = pendingSelection;
      if (!item) return showToast('请先选择服务');
      openSheet(`
        <div class="sheet-head"><h3>确认服务</h3><button class="close" id="closeSheet" type="button" aria-label="关闭">×</button></div>
        <div class="login-card">
          <b>${phone ? `已登录：${phone}` : '登录后可查看订单记录'}</b>
          <p>${phone ? '订单将绑定到当前手机号。' : '不登录也可以直接下单，建议填写手机号便于门店确认。'}</p>
          <button class="field" id="loginInline" type="button" style="text-align:left;background:#fff">${phone ? '切换手机号' : '手机号登录 / 绑定订单'}</button>
        </div>
        <div class="sheet-row"><span>${item.name} × ${item.quantity || 1}<br><small>${item.sub}${item.addOns?.length ? ' · 小项 ' + item.addOns.map(a => a.name).join('、') : ''}</small></span><strong>${money(selectionTotal(item))}</strong></div>
        <input class="field" id="checkoutPhone" maxlength="11" inputmode="tel" value="${phone}" placeholder="手机号（非必填）">
        <textarea class="field" id="checkoutNote" rows="2" placeholder="备注：力度、到店时间、同行人数"></textarea>
        <div class="sheet-row" style="font-size:18px;border-bottom:0"><span>项目合计</span><strong style="color:var(--accent)">${money(selectionTotal(item))}</strong></div>
        <button class="primary" id="submitOrder" type="button" style="width:100%;height:46px;margin-top:8px">确认提交</button>
      `);
      document.getElementById('loginInline').onclick = openLogin;
      document.getElementById('submitOrder').onclick = submitOrder;
    }

    function openLogin() {
      openSheet(`
        <div class="sheet-head"><h3>手机号登录</h3><button class="close" id="closeSheet" type="button" aria-label="关闭">×</button></div>
        <input class="field" id="loginPhone" maxlength="11" inputmode="tel" value="${phone}" placeholder="请输入手机号">
        <button class="primary" id="loginSubmit" type="button" style="width:100%;height:46px;margin-top:12px">登录</button>
        <p style="margin:10px 2px;color:#8a92a0;font-size:12px">仅用于查看历史订单和门店确认，不影响直接下单。</p>
      `);
      document.getElementById('loginSubmit').onclick = async () => {
        const nextPhone = document.getElementById('loginPhone').value.trim();
        if (!/^1\d{10}$/.test(nextPhone)) return showToast('手机号格式不正确');
        try {
          await fetch(API + '/api/v1/wellness/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ phone: nextPhone }) });
        } catch (error) {}
        phone = nextPhone;
        localStorage.setItem('hxy_phone', phone);
        closeSheet({ clearHistory: true });
        showToast('已登录');
      };
    }

    async function openHistory() {
      closeTransientLayers();
      if (!history.state?.hxyHistory) {
        history.pushState({ hxyHistory: true }, '', `${location.pathname}${location.search}#orders`);
      }
      openHistoryShell('<div class="empty" style="padding:35px 0">正在加载...</div>');
      const local = JSON.parse(localStorage.getItem('hxy_orders') || '[]');
      let remote = [];
      try {
        const query = phone ? `phone=${encodeURIComponent(phone)}` : `uid=${encodeURIComponent(uid)}`;
        const res = await fetch(API + '/api/v1/wellness/orders?' + query);
        if (res.ok) remote = await res.json();
      } catch (error) {}
      const merged = mergeOrders(remote, local);
      const body = merged.length ? merged.map(renderOrderRow).join('') : '<div class="empty" style="padding:35px 0">暂无历史订单</div>';
      openHistoryShell(`
        <div class="login-card">
          <b>${phone ? phone : '当前为游客订单'}</b>
          <p>${phone ? '展示该手机号关联订单。' : '登录手机号可查看跨设备订单。'}</p>
          <button class="field" id="historyLogin" type="button" style="text-align:left;background:#fff">${phone ? '切换手机号' : '手机号登录'}</button>
        </div>
        ${body}
      `);
      document.getElementById('historyLogin').onclick = renderHistoryLogin;
    }

    function renderOrderRow(order) {
      const items = parseItems(order.items);
      const status = { pending: '待确认', confirmed: '服务中', completed: '已完成' }[order.status] || order.status || '已提交';
      const created = order.created_at ? new Date(order.created_at).toLocaleString('zh-CN', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '';
      return `<div class="history-row">
        <span><b>${status}</b> <small>${created}</small><br><small>${items.map(item => item.name).join('、') || '服务订单'}</small></span>
        <strong>${money(order.total || 0)}</strong>
      </div>`;
    }

    function openHistoryShell(bodyHtml) {
      const page = document.getElementById('historyPage');
      page.innerHTML = `
        <div class="history-top">
          <button class="history-back" id="historyBack" type="button" aria-label="返回">‹</button>
          <h2>历史订单</h2>
          <span style="width:38px"></span>
        </div>
        <div class="history-scroll">${bodyHtml}</div>`;
      page.classList.add('open');
      document.getElementById('historyBack').onclick = () => closeHistory({ historyBack: true });
    }

    function renderHistoryLogin() {
      openHistoryShell(`
        <div class="login-card">
          <b>${phone ? '切换手机号' : '手机号登录'}</b>
          <p>用于展示该手机号关联订单，不影响继续浏览菜单。</p>
          <input class="field" id="historyPhone" maxlength="11" inputmode="tel" value="${phone}" placeholder="请输入手机号">
          <button class="primary" id="historyPhoneSubmit" type="button" style="width:100%;height:46px;margin-top:10px">确认</button>
        </div>
      `);
      document.getElementById('historyPhoneSubmit').onclick = async () => {
        const nextPhone = document.getElementById('historyPhone').value.trim();
        if (!/^1\d{10}$/.test(nextPhone)) return showToast('手机号格式不正确');
        try {
          await fetch(API + '/api/v1/wellness/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ phone: nextPhone }) });
        } catch (error) {}
        phone = nextPhone;
        localStorage.setItem('hxy_phone', phone);
        showToast('已切换手机号');
        openHistory();
      };
    }

    function closeHistory(options = {}) {
      const page = document.getElementById('historyPage');
      if (!page.classList.contains('open')) return;
      if (options.historyBack && history.state?.hxyHistory) {
        history.back();
        return;
      }
      page.classList.remove('open');
      page.innerHTML = '';
    }

    function mergeOrders(remote, local) {
      const seen = new Set();
      return [...remote, ...local].filter(order => {
        const key = String(order.id || order.order_id || order.created_at || '') + String(order.total || '');
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      }).sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));
    }

    function parseItems(items) {
      if (typeof items === 'string') {
        try { return JSON.parse(items) || []; } catch (error) { return []; }
      }
      return items || [];
    }

    async function submitOrder() {
      const item = pendingSelection;
      if (!item) return showToast('请先选择服务');
      const nextPhone = document.getElementById('checkoutPhone').value.trim();
      if (nextPhone && !/^1\d{10}$/.test(nextPhone)) return showToast('手机号格式不正确');
      hapticTap();
      if (nextPhone) {
        phone = nextPhone;
        localStorage.setItem('hxy_phone', phone);
      }
      const note = document.getElementById('checkoutNote').value.trim();
      const orderData = {
        uid,
        phone,
        seat: SEAT,
        store_id: STORE_ID,
        store: STORE,
        items: [item],
        total: selectionTotal(item),
        note,
        status: 'pending',
        created_at: new Date().toISOString(),
      };
      let saved = false;
      try {
        const res = await fetch(API + '/api/v1/wellness/orders', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(orderData) });
        saved = res.ok;
      } catch (error) {}
      const local = JSON.parse(localStorage.getItem('hxy_orders') || '[]');
      local.unshift({ id: Date.now(), ...orderData });
      localStorage.setItem('hxy_orders', JSON.stringify(local));
      pendingSelection = null;
      closeSheet({ clearHistory: true });
      render();
      showToast(saved ? '下单成功，等待前台确认' : '已保存本地订单，网络恢复后请联系前台');
    }

    function openSheet(html, options = {}) {
      if (!options.skipHistory && !history.state?.hxySheet) {
        history.pushState({ hxySheet: true }, '', `${location.pathname}${location.search}#sheet`);
      }
      sheetHistoryClosing = false;
      document.getElementById('overlay').classList.add('open');
      const sheet = document.getElementById('sheet');
      sheet.innerHTML = html;
      sheet.classList.add('open');
      document.getElementById('closeSheet')?.addEventListener('click', () => closeSheet({ historyBack: true }));
    }

    function closeSheet(options = {}) {
      const sheet = document.getElementById('sheet');
      if (!sheet.classList.contains('open')) return;
      if (options.historyBack) return requestSheetBack();
      if (options.clearHistory && history.state?.hxySheet) {
        history.replaceState(null, '', `${location.pathname}${location.search}`);
      }
      document.getElementById('overlay').classList.remove('open');
      sheet.classList.remove('open');
      sheetHistoryClosing = false;
    }

    function requestSheetBack() {
      const sheet = document.getElementById('sheet');
      if (!sheet.classList.contains('open') || sheetHistoryClosing) return;
      if (history.state?.hxySheet) {
        sheetHistoryClosing = true;
        history.back();
        setTimeout(() => {
          if (sheet.classList.contains('open') && sheetHistoryClosing) {
            closeSheet({ fromPop: true });
          }
        }, 350);
        return;
      }
      closeSheet({ fromPop: true });
    }

    function closeTransientLayers() {
      if (document.getElementById('sheet').classList.contains('open')) {
        closeSheet({ clearHistory: true });
      }
    }

    function hapticTap() {
      if (navigator.vibrate) navigator.vibrate(10);
    }

    function showToast(text) {
      clearTimeout(toastTimer);
      const toast = document.getElementById('toast');
      toast.textContent = text;
      toast.classList.add('show');
      toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
    }

    function escapeHtml(value) {
      return String(value || '').replace(/[&<>"']/g, char => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]));
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, '&#96;');
    }

    document.getElementById('historyBtn').onclick = openHistory;
    document.getElementById('storeBtn').onclick = () => showToast(STORE);
    document.getElementById('overlay').onclick = () => closeSheet({ historyBack: true });
    window.addEventListener('popstate', () => {
      if (document.getElementById('sheet').classList.contains('open')) {
        closeSheet({ fromPop: true });
      } else if (document.getElementById('historyPage').classList.contains('open')) {
        closeHistory({ fromPop: true });
      } else if (document.getElementById('detailPage').classList.contains('open')) {
        closeDetail({ fromPop: true });
      }
    });
    document.getElementById('detailPage').addEventListener('touchstart', event => {
      const touch = event.touches[0];
      touchStartX = touch.clientX;
      touchStartY = touch.clientY;
    }, { passive: true });
    document.getElementById('detailPage').addEventListener('touchend', event => {
      if (!document.getElementById('detailPage').classList.contains('open')) return;
      const touch = event.changedTouches[0];
      const dx = touch.clientX - touchStartX;
      const dy = touch.clientY - touchStartY;
      if (Math.abs(dx) > 72 && Math.abs(dx) > Math.abs(dy) * 1.25) {
        closeDetail({ historyBack: true });
      }
    }, { passive: true });
    document.getElementById('detailPage').addEventListener('pointerdown', event => {
      pointerStartX = event.clientX;
      pointerStartY = event.clientY;
    });
    document.getElementById('detailPage').addEventListener('pointerup', event => {
      if (!document.getElementById('detailPage').classList.contains('open')) return;
      const dx = event.clientX - pointerStartX;
      const dy = event.clientY - pointerStartY;
      if (Math.abs(dx) > 72 && Math.abs(dx) > Math.abs(dy) * 1.25) {
        closeDetail({ historyBack: true });
      }
    });
    document.getElementById('detailPage').addEventListener('mousedown', event => {
      mouseStartX = event.clientX;
      mouseStartY = event.clientY;
    });
    document.getElementById('detailPage').addEventListener('mouseup', event => {
      if (!document.getElementById('detailPage').classList.contains('open')) return;
      const dx = event.clientX - mouseStartX;
      const dy = event.clientY - mouseStartY;
      if (Math.abs(dx) > 72 && Math.abs(dx) > Math.abs(dy) * 1.25) {
        closeDetail({ historyBack: true });
      }
    });

    loadCatalog();
  </script>
</body>
</html>
