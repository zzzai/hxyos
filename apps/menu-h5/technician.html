<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>荷小悦 · 技师服务台</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    :root { --primary:#4f9778; --dark:#173c2f; --soft:#eef8f3; --line:#e5eee8; --muted:#7a8699; --bg:#f7faf8; --gold:#ad7a24; }
    body { margin:0; min-height:100dvh; background:var(--bg); color:#101828; font-family:"Noto Sans SC", system-ui, sans-serif; }
    button,input { font-family:inherit; }
    button { border:0; cursor:pointer; }
    .auth { position:fixed; inset:0; z-index:50; background:linear-gradient(180deg,#fff,#edf7f1); display:grid; place-items:center; }
    .auth.hidden { display:none; }
    .auth-card { width:min(360px, calc(100vw - 32px)); background:#fff; border:1px solid var(--line); border-radius:18px; padding:26px; box-shadow:0 24px 60px rgba(31,86,63,.16); }
    .auth-card h1 { margin:0 0 8px; font-size:24px; }
    .auth-card p { margin:0 0 18px; color:var(--muted); }
    .field { width:100%; min-height:44px; border:1px solid var(--line); border-radius:12px; padding:9px 12px; outline:none; background:#fff; }
    .btn { min-height:44px; border-radius:12px; padding:0 15px; font-weight:800; background:#fff; border:1px solid var(--line); color:#344054; }
    .btn.primary { background:var(--primary); border-color:var(--primary); color:#fff; }
    .btn.danger { color:#b42318; border-color:#fecdca; background:#fffafa; }
    .app { max-width:980px; margin:0 auto; padding:28px 16px 40px; }
    .header { display:flex; justify-content:space-between; align-items:flex-start; gap:14px; margin-bottom:18px; }
    .header h1 { margin:0; font-size:28px; letter-spacing:-.6px; }
    .header p { margin:7px 0 0; color:var(--muted); }
    .filters { display:flex; gap:8px; overflow:auto; padding-bottom:12px; }
    .filter { white-space:nowrap; padding:9px 14px; border:1px solid var(--line); background:#fff; color:#667085; border-radius:999px; font-weight:800; }
    .filter.active { background:var(--primary); color:#fff; border-color:var(--primary); }
    .layout { display:grid; grid-template-columns:minmax(0,.9fr) minmax(340px,1.1fr); gap:16px; align-items:start; }
    .panel { background:#fff; border:1px solid var(--line); border-radius:18px; box-shadow:0 12px 32px rgba(16,24,40,.04); }
    .orders { padding:12px; display:flex; flex-direction:column; gap:10px; }
    .order-card { text-align:left; width:100%; background:#fff; border:1px solid var(--line); border-radius:15px; padding:14px; }
    .order-card.active { border-color:var(--primary); background:#f5fbf8; box-shadow:0 10px 24px rgba(79,151,120,.12); }
    .order-top { display:flex; justify-content:space-between; gap:10px; align-items:center; }
    .seat { font-size:19px; font-weight:900; color:var(--dark); }
    .badge { padding:3px 9px; border-radius:999px; background:#fff6e7; color:var(--gold); font-size:12px; font-weight:800; }
    .badge.confirmed { background:#ecfdf3; color:#027a48; }
    .badge.completed { background:#f2f4f7; color:#667085; }
    .badge.cancelled { background:#fff1f0; color:#b42318; }
    .badge.exception { background:#fff7ed; color:#c2410c; }
    .items { color:#344054; line-height:1.7; font-size:14px; margin:8px 0 0; }
    .meta { color:var(--muted); font-size:12px; margin-top:8px; display:flex; justify-content:space-between; gap:8px; }
    .detail { padding:18px; }
    .detail h2 { margin:0 0 4px; font-size:24px; }
    .detail-sub { color:var(--muted); margin-bottom:14px; }
    .quick { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:14px; }
    .quick-card { background:var(--soft); border:1px solid #d9eee4; border-radius:14px; padding:12px; }
    .quick-card b { display:block; color:var(--dark); font-size:18px; }
    .quick-card span { color:#667085; font-size:12px; }
    .section { border-top:1px solid var(--line); padding-top:16px; margin-top:16px; }
    .section h3 { margin:0 0 12px; padding-left:9px; border-left:4px solid var(--primary); font-size:16px; }
    .qpty { display:grid; grid-template-columns:32px minmax(0,1fr); gap:9px; margin:8px 0; align-items:start; }
    .qpty b { width:32px; height:32px; display:grid; place-items:center; border-radius:10px; background:var(--soft); color:var(--primary); }
    .qpty span { color:#344054; line-height:1.65; font-size:14px; }
    .step-list { margin:0; padding-left:20px; color:#344054; line-height:1.9; }
    .script { background:#fff9ed; border:1px solid #f8e0b0; color:#704b14; border-radius:14px; padding:12px; line-height:1.7; }
    .action-row { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:18px; }
    .empty { padding:60px 20px; text-align:center; color:var(--muted); }
    @media (max-width: 820px) {
      .layout { grid-template-columns:1fr; }
      .quick { grid-template-columns:repeat(3,1fr); }
    }
  </style>
</head>
<body>
  <div class="auth" id="auth">
    <div class="auth-card">
      <h1>技师服务台</h1>
      <p>查看订单、服务步骤、清泡调补养与推荐话术。</p>
      <input class="field" id="username" autocomplete="username" placeholder="账号，默认 admin" style="margin-bottom:10px">
      <input class="field" id="pass" type="password" autocomplete="current-password" placeholder="请输入密码">
      <button class="btn primary" id="login" type="button" style="width:100%;margin-top:12px">进入</button>
      <p id="authMsg" role="alert" style="color:#b42318"></p>
    </div>
  </div>

  <main class="app">
    <header class="header">
      <div>
        <h1>技师服务台</h1>
        <p>按订单履约，不漏步骤，不漏推荐。</p>
      </div>
      <button class="btn" id="refresh" type="button">刷新</button>
    </header>
    <div class="filters" id="filters"></div>
    <div class="layout">
      <section class="panel orders" id="orders"></section>
      <section class="panel detail" id="detail"></section>
    </div>
  </main>

  <script>
    const API = (location.hostname === 'localhost' || location.hostname === '127.0.0.1') && location.port === '18888' ? 'http://localhost:8000' : '';
    const LEGACY_TOKEN = 'hxy2024';
    const TECH_TOKEN_KEY = 'hxy_tech_token';
    const TECH_SESSION_KEY = 'hxy_tech_session_token';
    const TECH_ACCOUNT_KEY = 'hxy_tech_account';
    const params = new URLSearchParams(location.search);
    const STORE_ID = params.get('store_id') || '';
    let orders = [];
    let catalog = { projects: [] };
    let filter = 'pending';
    let selectedId = null;
    const statusLabel = { pending:'待确认', confirmed:'服务中', completed:'已完成', cancelled:'已取消', exception:'异常' };

    if (sessionStorage.getItem(TECH_SESSION_KEY) || sessionStorage.getItem('hxy_tech') === '1') document.getElementById('auth').classList.add('hidden');
    document.getElementById('pass').addEventListener('keydown', event => { if (event.key === 'Enter') login(); });
    document.getElementById('login').onclick = login;

    async function login() {
      const username = document.getElementById('username').value.trim() || 'admin';
      const password = document.getElementById('pass').value;
      document.getElementById('authMsg').textContent = '';
      try {
        const res = await fetch(API + '/api/v1/wellness/auth/login', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({username, password}),
        });
        if (!res.ok) throw new Error((await res.json().catch(() => ({}))).detail || '账号或密码错误');
        const payload = await res.json();
        sessionStorage.setItem('hxy_tech', '1');
        sessionStorage.setItem(TECH_SESSION_KEY, payload.token);
        sessionStorage.setItem(TECH_ACCOUNT_KEY, JSON.stringify(payload.account || {}));
        sessionStorage.removeItem(TECH_TOKEN_KEY);
        document.getElementById('auth').classList.add('hidden');
        loadAll();
      } catch (error) {
        if (username === 'admin' && password === LEGACY_TOKEN) {
          sessionStorage.setItem('hxy_tech', '1');
          sessionStorage.setItem(TECH_TOKEN_KEY, password);
          sessionStorage.removeItem(TECH_SESSION_KEY);
          document.getElementById('auth').classList.add('hidden');
          loadAll();
          return;
        }
        document.getElementById('authMsg').textContent = error.message || '登录失败';
      }
    }

    function renderFilters() {
      const list = [
        {key:'pending', label:'待确认'},
        {key:'confirmed', label:'服务中'},
        {key:'completed', label:'已完成'},
        {key:'exception', label:'异常'},
        {key:'cancelled', label:'已取消'},
        {key:'', label:'全部'},
      ];
      document.getElementById('filters').innerHTML = list.map(item => `<button class="filter ${filter===item.key?'active':''}" type="button" data-filter="${item.key}">${item.label}</button>`).join('');
      document.querySelectorAll('.filter').forEach(btn => btn.onclick = () => { filter = btn.dataset.filter; render(); });
    }

    async function loadAll() {
      const orderQuery = STORE_ID ? `?store_id=${encodeURIComponent(STORE_ID)}` : '';
      const catalogQuery = STORE_ID ? `?store_id=${encodeURIComponent(STORE_ID)}` : '';
      const [orderRes, catalogRes] = await Promise.all([
        fetch(API + '/api/v1/wellness/staff/orders' + orderQuery, { headers: authHeaders() }),
        fetch(API + '/api/v1/wellness/catalog' + catalogQuery),
      ]);
      orders = await orderRes.json();
      catalog = await catalogRes.json();
      selectedId = orders[0]?.id || null;
      render();
    }

    function visibleOrders() {
      return orders.filter(o => !filter || o.status === filter);
    }

    function render() {
      renderFilters();
      const rows = visibleOrders();
      if (!rows.length) {
        document.getElementById('orders').innerHTML = '<div class="empty">暂无订单</div>';
        document.getElementById('detail').innerHTML = '<div class="empty">选择左侧订单查看服务说明</div>';
        return;
      }
      if (!rows.some(o => o.id === selectedId)) selectedId = rows[0].id;
      document.getElementById('orders').innerHTML = rows.map(renderOrderCard).join('');
      document.querySelectorAll('.order-card').forEach(btn => btn.onclick = () => { selectedId = Number(btn.dataset.id); render(); });
      renderDetail(rows.find(o => o.id === selectedId) || rows[0]);
    }

    function renderOrderCard(order) {
      const items = parseItems(order);
      return `<button class="order-card ${order.id===selectedId?'active':''}" type="button" data-id="${order.id}">
        <div class="order-top">
          <div class="seat">${order.seat ? '座位 ' + order.seat : '未带座位'}</div>
          <span class="badge ${order.status}">${statusLabel[order.status] || order.status}</span>
        </div>
        <div class="items">${items.map(i => i.name).join(' · ')}</div>
        <div class="meta"><span>${order.phone || '未留手机号'}</span><strong>¥${order.total || 0}</strong></div>
      </button>`;
    }

    function renderDetail(order) {
      const items = parseItems(order);
      const primary = items[0] || {};
      const project = findProject(primary);
      const qpty = primary.qingPaoTiaoBuYang || project?.qingPaoTiaoBuYang || {};
      const steps = primary.serviceSteps || project?.serviceSteps || [];
      const notes = primary.technicianNotes || project?.technicianNotes || '后台暂未配置技师说明。';
      const script = project?.recommendScript || '后台暂未配置推荐话术。';
      const actions = renderDetailActions(order);
      document.getElementById('detail').innerHTML = `
        <h2>${primary.name || '订单详情'}</h2>
        <div class="detail-sub">${order.store || '默认门店'} · ${order.seat ? '座位 ' + order.seat : '未带座位'} · ${new Date(order.created_at).toLocaleString('zh-CN')}</div>
        <div class="quick">
          <div class="quick-card"><b>${items.length}</b><span>项目数</span></div>
          <div class="quick-card"><b>¥${order.total || 0}</b><span>订单金额</span></div>
          <div class="quick-card"><b>${statusLabel[order.status] || '-'}</b><span>状态</span></div>
        </div>
        ${order.note ? `<div class="script">顾客备注：${order.note}</div>` : ''}
        <div class="section"><h3>顾客选择</h3>${items.map(renderSelectedItem).join('')}</div>
        <div class="section"><h3>清泡调补养</h3>${['清','泡','调','补','养'].map(k => `<div class="qpty"><b>${k}</b><span>${(qpty[k]||['未配置']).join(' · ')}</span></div>`).join('')}</div>
        <div class="section"><h3>服务步骤</h3><ol class="step-list">${steps.map(step => `<li>${step}</li>`).join('') || '<li>后台暂未配置服务步骤</li>'}</ol></div>
        <div class="section"><h3>技师说明</h3><div class="script">${notes}</div></div>
        <div class="section"><h3>推荐话术</h3><div class="script">${script}</div></div>
        <div class="action-row">${actions}</div>`;
      document.querySelectorAll('[data-status-to]').forEach(btn => {
        btn.onclick = () => updateStatus(order.id, btn.dataset.statusTo);
      });
    }

    function renderDetailActions(order) {
      if (order.status === 'pending') {
        return `
          <button class="btn primary" type="button" data-status-to="confirmed">确认开始</button>
          <button class="btn danger" type="button" data-status-to="exception">标记异常</button>
          <button class="btn" type="button" data-status-to="cancelled">取消</button>`;
      }
      if (order.status === 'confirmed') {
        return `
          <button class="btn primary" type="button" data-status-to="completed">完成服务</button>
          <button class="btn danger" type="button" data-status-to="exception">标记异常</button>
          <button class="btn" type="button" data-status-to="confirmed">刷新状态</button>`;
      }
      return `<button class="btn" type="button" data-status-to="${order.status}">刷新状态</button>`;
    }

    function renderSelectedItem(item) {
      const addOns = (item.addOns || []).map(a => `${a.name}+¥${a.price}`).join('，');
      const optionGroups = item.options ? [
        ...Object.entries(item.options.required || {}).map(([key, value]) => `${key}：${value}`),
        ...Object.entries(item.options.optional || {}).map(([key, value]) => `${key}：${value}`),
        ...Object.entries(item.options.multi || {}).filter(([, values]) => values?.length).map(([key, values]) => `${key}：${values.join('、')}`),
      ] : [];
      const options = optionGroups.filter(Boolean).join('，') || item.sub || '';
      return `<div class="qpty"><b>项</b><span><strong>${item.name}</strong><br>${options || '基础服务'}${addOns ? '<br>小项：' + addOns : ''}</span></div>`;
    }

    function parseItems(order) {
      if (!order) return [];
      if (typeof order.items === 'string') {
        try { return JSON.parse(order.items) || []; } catch (error) { return []; }
      }
      return order.items || [];
    }

    function findProject(item) {
      return (catalog.projects || []).find(p => p.id === item.projectId || p.name === item.name);
    }

    async function updateStatus(orderId, status) {
      await fetch(API + `/api/v1/wellness/staff/orders/${orderId}/status`, {
        method: 'PUT',
        headers: {'Content-Type':'application/json', ...authHeaders()},
        body: JSON.stringify({status, actor: 'technician'}),
      });
      await loadAll();
    }

    function authHeaders() {
      const sessionToken = sessionStorage.getItem(TECH_SESSION_KEY);
      if (sessionToken) return {'X-Wellness-Session-Token': sessionToken};
      const legacyToken = sessionStorage.getItem(TECH_TOKEN_KEY) || (sessionStorage.getItem('hxy_tech') === '1' ? LEGACY_TOKEN : '');
      return legacyToken ? {'X-Wellness-Admin-Token': legacyToken} : {};
    }

    document.getElementById('refresh').onclick = loadAll;
    if (sessionStorage.getItem(TECH_SESSION_KEY) || sessionStorage.getItem('hxy_tech') === '1') loadAll().catch(() => render());
    renderFilters();
  </script>
</body>
</html>
