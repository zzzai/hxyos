<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HXYOS 说法检查</title>
  <style>
    :root {
      --bg: #f6f7f3;
      --paper: #ffffff;
      --ink: #20251f;
      --muted: #687266;
      --subtle: #8b9489;
      --line: #dde4d9;
      --line-strong: #bdc9bd;
      --accent: #17634f;
      --accent-ink: #0c3d30;
      --accent-soft: #e8f2ec;
      --bad: #8f2f1f;
      --bad-soft: #f8e8e3;
      --warn: #8a6219;
      --warn-soft: #f5efe3;
      --ok: #17634f;
      --ok-soft: #e8f2ec;
      --radius: 8px;
      --shadow: 0 20px 64px rgba(38, 48, 36, 0.09);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      overflow-x: hidden;
      background: var(--bg);
      color: var(--ink);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      letter-spacing: 0;
    }

    button,
    textarea,
    input,
    select {
      font: inherit;
      letter-spacing: 0;
    }

    button,
    a {
      cursor: pointer;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button:focus-visible,
    a:focus-visible,
    textarea:focus-visible,
    input:focus-visible,
    select:focus-visible {
      outline: 3px solid rgba(23, 99, 79, 0.25);
      outline-offset: 3px;
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    .shell {
      min-height: 100dvh;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 62px;
      border-bottom: 1px solid var(--line);
      padding: 0 28px;
      background: rgba(246, 247, 243, 0.94);
      backdrop-filter: blur(14px);
    }

    .brand,
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      white-space: nowrap;
    }

    .brand {
      min-width: 0;
      font-size: 15px;
      font-weight: 780;
    }

    .brand-mark {
      display: inline-grid;
      place-items: center;
      width: 24px;
      height: 24px;
      border: 1px solid var(--ink);
      border-radius: 6px;
      font-size: 12px;
      line-height: 1;
    }

    .back-link {
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    .back-link:hover {
      color: var(--accent);
    }

    main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(290px, 360px);
      gap: 20px;
      width: min(1040px, calc(100vw - 48px));
      margin: 0 auto;
      padding: 34px 0;
    }

    .checker,
    .guide {
      min-width: 0;
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper);
      box-shadow: var(--shadow);
    }

    .checker {
      display: grid;
      gap: 20px;
      padding: 26px;
    }

    .page-head {
      display: grid;
      gap: 10px;
      max-width: 640px;
    }

    .page-kicker {
      color: var(--accent);
      font-size: 13px;
      font-weight: 800;
    }

    h1 {
      font-size: clamp(34px, 4.4vw, 58px);
      line-height: 1.04;
      font-weight: 820;
    }

    .summary {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
      overflow-wrap: anywhere;
    }

    .form-grid {
      display: grid;
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    label,
    .field-label {
      color: var(--ink);
      font-size: 14px;
      font-weight: 760;
    }

    textarea,
    input,
    select {
      width: 100%;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: #fbfcf9;
      color: var(--ink);
    }

    textarea {
      min-height: 168px;
      resize: vertical;
      padding: 14px;
      font-size: 15px;
      line-height: 1.7;
    }

    select {
      min-height: 44px;
      padding: 0 12px;
      font-size: 14px;
      font-weight: 720;
    }

    input {
      min-height: 42px;
      padding: 0 12px;
      font-size: 14px;
    }

    textarea::placeholder {
      color: var(--subtle);
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .primary-button,
    .sample-button {
      min-height: 42px;
      border-radius: var(--radius);
      padding: 0 16px;
      font-size: 14px;
      font-weight: 760;
      transition: background 140ms ease, border-color 140ms ease, color 140ms ease, transform 120ms ease;
    }

    .primary-button {
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #ffffff;
    }

    .primary-button:hover {
      background: var(--accent-ink);
    }

    .sample-button {
      border: 1px solid var(--line-strong);
      background: #fbfcf9;
      color: var(--ink);
    }

    .sample-button:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .primary-button:active,
    .sample-button:active {
      transform: translateY(1px);
    }

    .result {
      display: grid;
      gap: 12px;
      min-height: 178px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fbfcf9;
      padding: 16px;
      color: var(--ink);
      font-size: 15px;
      line-height: 1.62;
      overflow-wrap: anywhere;
    }

    .decision-row {
      display: grid;
      gap: 6px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 12px;
    }

    .decision-row:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .decision-row span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 760;
    }

    .decision-row strong {
      font-size: 18px;
      line-height: 1.35;
      font-weight: 820;
    }

    .status {
      width: fit-content;
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 13px;
      font-weight: 800;
    }

    .status.ok {
      background: var(--ok-soft);
      color: var(--ok);
    }

    .status.warn {
      background: var(--warn-soft);
      color: var(--warn);
    }

    .status.bad {
      background: var(--bad-soft);
      color: var(--bad);
    }

    .guide {
      align-self: start;
      display: grid;
      gap: 16px;
      padding: 20px;
    }

    h2 {
      font-size: 21px;
      line-height: 1.25;
      font-weight: 800;
    }

    .rule-list {
      display: grid;
      gap: 10px;
    }

    .rule {
      display: grid;
      gap: 6px;
      border-top: 1px solid var(--line);
      padding-top: 10px;
    }

    .rule:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .rule strong {
      font-size: 15px;
    }

    .rule span,
    .note {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.58;
      overflow-wrap: anywhere;
    }

    .note {
      border-radius: var(--radius);
      background: var(--warn-soft);
      color: var(--warn);
      padding: 12px;
    }

    @media (max-width: 900px) {
      .topbar {
        padding: 0 18px;
      }

      .back-link span {
        display: none;
      }

      main {
        grid-template-columns: 1fr;
        width: min(calc(100vw - 28px), 620px);
        padding: 20px 0;
      }

      .checker,
      .guide {
        padding: 18px;
      }

      .primary-button,
      .sample-button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">H</span>
        <span>HXYOS 说法检查</span>
      </div>
      <a class="back-link" href="index.html" aria-label="回到工作台">
        <span>回到工作台</span>
      </a>
    </header>

    <main>
      <section class="checker" aria-labelledby="brandCheckTitle">
        <div class="page-head">
          <div class="page-kicker">动作前预检</div>
          <h1 id="brandCheckTitle">这句话能不能发？</h1>
          <p class="summary">先预检，不直接发布。把准备使用的话贴进来，只看它能不能进入下一步。</p>
        </div>

        <div class="form-grid">
          <div class="field">
            <label for="brandPurposeSelect">用途</label>
            <select id="brandPurposeSelect" aria-label="用途">
              <option value="content_publish">发出去</option>
              <option value="staff_script">给员工说</option>
              <option value="project_menu">放进项目菜单</option>
            </select>
          </div>

          <div class="field">
            <label for="brandApiToken">系统口令</label>
            <input id="brandApiToken" type="password" autocomplete="off" placeholder="连接企业预检">
          </div>

          <div class="field">
            <label for="brandTextInput">把准备使用的话贴进来</label>
            <textarea id="brandTextInput" placeholder="比如：泡一次就能治好失眠，保证一周见效。"></textarea>
          </div>
        </div>

        <div class="actions">
          <button class="primary-button" type="button" onclick="runBrandPreflight()">立即预检</button>
          <button class="sample-button" type="button" onclick="loadBrandSample('price')">价格说明样例</button>
          <button class="sample-button" type="button" onclick="loadBrandSample('effect')">效果说明样例</button>
        </div>

        <div id="brandCheckResult" class="result" aria-live="polite">
          <div class="decision-row">
            <span>能不能继续</span>
            <strong>先预检</strong>
          </div>
          <div class="decision-row">
            <span>为什么</span>
            <p>系统会判断医疗、保证、夸大这三类风险。</p>
          </div>
          <div class="decision-row">
            <span>怎么改</span>
            <p>检查后给出更克制、更能直接使用的说法。</p>
          </div>
          <div class="decision-row">
            <span>下一步</span>
            <p>能继续再给负责人确认，不能继续就先改。</p>
          </div>
        </div>
      </section>

      <aside class="guide" aria-labelledby="ruleTitle">
        <h2 id="ruleTitle">只看三条红线</h2>
        <div class="rule-list">
          <div class="rule">
            <strong>医疗</strong>
            <span>不要说治疗、治愈、调理疾病，也不要替代医生判断。</span>
          </div>
          <div class="rule">
            <strong>保证</strong>
            <span>不要说一定有效、几天见效、包好。体验感受要留出个体差异。</span>
          </div>
          <div class="rule">
            <strong>夸大</strong>
            <span>不要说最好、第一、唯一。说清楚服务特点，比喊口号更稳。</span>
          </div>
        </div>
        <div class="note">这页只做动作前判断。正式物料还要负责人确认，核心知识不会被这次检查改掉。</div>
      </aside>
    </main>
  </div>

  <script>
    const brandTextInput = document.getElementById("brandTextInput");
    const brandPurposeSelect = document.getElementById("brandPurposeSelect");
    const brandApiToken = document.getElementById("brandApiToken");
    const brandCheckResult = document.getElementById("brandCheckResult");
    const defaultApiBase = window.location.origin && window.location.origin !== "null"
      ? window.location.origin
      : "http://127.0.0.1:18081";
    const apiBaseCandidates = [
      defaultApiBase,
      "http://127.0.0.1:18081"
    ].filter((value, index, values) => value && values.indexOf(value) === index);

    const purposeOptions = {
      content_publish: {
        workflow_type: "content_publish",
        channel: "朋友圈",
        label: "发出去"
      },
      staff_script: {
        workflow_type: "staff_script",
        channel: "员工话术",
        label: "给员工说"
      },
      project_menu: {
        workflow_type: "project_menu",
        channel: "项目菜单",
        label: "放进项目菜单"
      }
    };

    const defaultRiskRules = [
      {
        type: "医疗",
        level: "bad",
        words: ["治疗", "治愈", "治好", "根治", "诊断", "处方", "疗效", "调理疾病", "改善高血压", "治疗失眠", "改善睡眠", "治疗脚气"],
        advice: "不要把服务说成医疗行为。"
      },
      {
        type: "保证",
        level: "bad",
        words: ["保证", "一定有效", "一周见效", "见效", "一次见效", "立刻见效", "包好", "保证有效", "无效退款", "祛湿排毒"],
        advice: "不要承诺确定结果。"
      },
      {
        type: "夸大",
        level: "warn",
        words: ["最好", "第一", "唯一", "顶级", "神奇", "年轻十岁", "医美级"],
        advice: "不要用无法证明的绝对化表达。"
      }
    ];
    let riskRules = defaultRiskRules.map((rule) => ({ ...rule, words: [...rule.words] }));

    function initialApiToken() {
      return localStorage.getItem("hxyActionApiToken")
        || localStorage.getItem("hxyBrainApiToken")
        || localStorage.getItem("hxyKnowledgeApiToken")
        || "";
    }

    async function requestJson(path, options = {}) {
      let lastError;
      const headers = new Headers(options.headers || {});
      const token = brandApiToken.value.trim();
      if (token) headers.set("Authorization", `Bearer ${token}`);
      for (const apiBase of apiBaseCandidates) {
        try {
          const response = await fetch(`${apiBase}${path}`, { ...options, headers });
          if (!response.ok) {
            throw new Error(`${response.status} ${response.statusText}`);
          }
          return response.json();
        } catch (error) {
          lastError = error;
        }
      }
      throw lastError || new Error("API 请求失败");
    }

    function normalizeRiskRules(rules) {
      return rules
        .filter((rule) => rule && Array.isArray(rule.words) && rule.words.length > 0)
        .map((rule) => ({
          type: rule.type || "风险词",
          level: rule.level === "bad" ? "bad" : "warn",
          words: [...new Set(rule.words.filter(Boolean).map(String))],
          advice: rule.advice || "这类说法先换成更克制、更具体的表达。"
        }));
    }

    async function loadBrandRiskRules() {
      try {
        const result = await requestJson("/api/operating-brain/brand-risk-rules");
        const loadedRules = normalizeRiskRules(result.rules || []);
        if (loadedRules.length > 0) {
          riskRules = loadedRules;
        }
      } catch (error) {
        riskRules = defaultRiskRules.map((rule) => ({ ...rule, words: [...rule.words] }));
      }
    }

    const samples = {
      price: "我们不是单纯比便宜，而是把草本泡脚、肩颈放松和到店体验放在一起，适合身体累了想轻松一下的人。",
      effect: "泡脚和按摩可以帮助身体放松，具体感受因人而异。如果长期不舒服，建议先咨询医生。"
    };

    function escapeHtml(text) {
      return String(text || "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      }[char]));
    }

    const boundaryMarkers = ["不能", "不要", "不得", "禁止", "避免", "不做", "不说", "不承诺", "不替代", "不能替代", "不是"];

    function sentenceWindow(text, word, index) {
      const left = Math.max(
        text.lastIndexOf("。", index),
        text.lastIndexOf("！", index),
        text.lastIndexOf("？", index),
        text.lastIndexOf("\n", index)
      );
      const rightPositions = ["。", "！", "？", "\n"]
        .map((mark) => text.indexOf(mark, index))
        .filter((position) => position !== -1);
      const right = rightPositions.length ? Math.min(...rightPositions) : text.length;
      return text.slice(left + 1, right + word.length);
    }

    function isBoundaryUse(text, word, index) {
      const sentence = sentenceWindow(text, word, index);
      const before = text.slice(Math.max(0, index - 14), index);
      return boundaryMarkers.some((marker) => sentence.includes(marker) && before.includes(marker));
    }

    function hasRiskWord(text, word) {
      let start = 0;
      while (start < text.length) {
        const index = text.indexOf(word, start);
        if (index === -1) {
          return false;
        }
        if (!isBoundaryUse(text, word, index)) {
          return true;
        }
        start = index + word.length;
      }
      return false;
    }

    function softerRewrite(text) {
      return text
        .replaceAll("治疗失眠", "帮助放松")
        .replaceAll("治疗脚气", "不替代医疗建议")
        .replaceAll("改善高血压", "不替代医疗建议")
        .replaceAll("改善睡眠", "帮助放松")
        .replaceAll("治疗", "帮助放松")
        .replaceAll("治愈", "缓解疲惫感")
        .replaceAll("治好", "缓解疲惫感")
        .replaceAll("根治", "日常放松")
        .replaceAll("诊断", "了解体验需求")
        .replaceAll("处方", "服务建议")
        .replaceAll("疗效", "体验感受")
        .replaceAll("调理疾病", "日常放松")
        .replaceAll("祛湿排毒", "泡着舒服")
        .replaceAll("保证", "建议")
        .replaceAll("一定有效", "因人而异")
        .replaceAll("一周见效", "持续体验后再观察")
        .replaceAll("一次见效", "体验感受因人而异")
        .replaceAll("立刻见效", "体验后感受会因人而异")
        .replaceAll("见效", "感受")
        .replaceAll("保证有效", "体验感受因人而异")
        .replaceAll("包好", "不替代医疗建议")
        .replaceAll("无效退款", "到店前可先了解服务内容")
        .replaceAll("最好", "更适合一部分")
        .replaceAll("第一", "专注")
        .replaceAll("唯一", "主打")
        .replaceAll("顶级", "稳定")
        .replaceAll("神奇", "舒服")
        .replaceAll("年轻十岁", "状态更轻松")
        .replaceAll("医美级", "体验感更精致");
    }

    function buildBrandPreflightPayload(text) {
      const purpose = purposeOptions[brandPurposeSelect.value] || purposeOptions.content_publish;
      return {
        workflow_type: purpose.workflow_type,
        text,
        channel: purpose.channel,
        audience: purpose.workflow_type === "staff_script" ? "staff" : "customer"
      };
    }

    function localHits(text) {
      return riskRules
        .map((rule) => ({
          ...rule,
          words: rule.words.filter((word) => hasRiskWord(text, word))
        }))
        .filter((rule) => rule.words.length > 0);
    }

    function buildLocalPreflightResult(text) {
      const hits = localHits(text);
      const hasBad = hits.some((hit) => hit.level === "bad");
      const hitTypes = hits.map((hit) => hit.type).join("、");
      const base = {
        risk_reason: hits.length
          ? `命中${hitTypes}风险，需要先改。`
          : "没有命中当前红线。仍然只代表动作前预检。",
        rewrite_suggestion: hits.length ? softerRewrite(text) : text,
        hit_gates: hits.map((hit) => hit.type)
      };

      if (hasBad) {
        return {
          ...base,
          decision: "block",
          workflow_status: "blocked",
          risk_level: "high",
          next_step: "先改掉风险表达，再交给负责人确认。"
        };
      }

      if (hits.length > 0) {
        return {
          ...base,
          decision: "revise",
          workflow_status: "revise_before_continue",
          risk_level: "medium",
          next_step: "按建议改写后再预检一次。"
        };
      }

      return {
        ...base,
        decision: "allow",
        workflow_status: "can_continue",
        risk_level: "low",
        next_step: "可以进入下一步，但正式物料仍要负责人确认。"
      };
    }

    function workflowLabel(payload) {
      const labels = {
        can_continue: "可以继续",
        revise_before_continue: "先改再继续",
        blocked: "不要继续"
      };
      if (payload.workflow_status && labels[payload.workflow_status]) {
        return labels[payload.workflow_status];
      }
      if (payload.decision === "allow") return "可以继续";
      if (payload.decision === "revise") return "先改再继续";
      return "不要继续";
    }

    function statusClass(payload) {
      const status = payload.workflow_status || "";
      if (status === "can_continue" || payload.decision === "allow") return "ok";
      if (status === "revise_before_continue" || payload.decision === "revise") return "warn";
      return "bad";
    }

    function readableReason(payload) {
      if (payload.risk_reason) return payload.risk_reason;
      const gates = Array.isArray(payload.hit_gates) ? payload.hit_gates.join("、") : "";
      return gates ? `命中${gates}风险。` : "没有命中当前红线。";
    }

    function renderBrandPreflightResult(payload) {
      const label = workflowLabel(payload);
      const level = statusClass(payload);
      const reason = readableReason(payload);
      const rewrite = payload.rewrite_suggestion || "保持具体、克制，不讲医疗结论、保证结果或绝对第一。";
      const nextStep = payload.next_step || "交给负责人确认后再使用。";

      brandCheckResult.innerHTML = `
        <span class="status ${level}">${escapeHtml(label)}</span>
        <div class="decision-row">
          <span>能不能继续</span>
          <strong>${escapeHtml(label)}</strong>
        </div>
        <div class="decision-row">
          <span>为什么</span>
          <p>${escapeHtml(reason)}</p>
        </div>
        <div class="decision-row">
          <span>怎么改</span>
          <p>${escapeHtml(rewrite)}</p>
        </div>
        <div class="decision-row">
          <span>下一步</span>
          <p>${escapeHtml(nextStep)}</p>
        </div>
      `;
    }

    async function runBrandPreflight() {
      const text = brandTextInput.value.trim();
      const token = brandApiToken.value.trim();
      if (token) {
        localStorage.setItem("hxyActionApiToken", token);
      }

      if (!text) {
        renderBrandPreflightResult({
          decision: "revise",
          workflow_status: "revise_before_continue",
          risk_reason: "先贴入一句准备使用的话，再做动作前判断。",
          rewrite_suggestion: "把原句贴进来，不要只写关键词。",
          next_step: "补充原句后重新预检。"
        });
        brandTextInput.focus();
        return;
      }

      try {
        const payload = await requestJson("/api/operating-brain/workflow-gates/compliance/run", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(buildBrandPreflightPayload(text))
        });
        renderBrandPreflightResult(payload);
      } catch (error) {
        renderBrandPreflightResult(buildLocalPreflightResult(text));
      }
    }

    function runBrandCheck() {
      return runBrandPreflight();
    }

    function loadBrandSample(name) {
      brandTextInput.value = samples[name] || "";
      runBrandPreflight();
    }

    brandApiToken.value = initialApiToken();
    loadBrandRiskRules();
  </script>
</body>
</html>
