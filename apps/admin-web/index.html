<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=startup.html">
  <title>荷小悦 0-1 项目推进器</title>
  <style>
    :root {
      --bg: #f4f5f1;
      --surface: rgba(255, 255, 255, 0.88);
      --ink: #202720;
      --muted: #626c61;
      --line: rgba(87, 103, 86, 0.18);
      --accent: #116a58;
      --accent-strong: #07463b;
      --accent-soft: #e5f0ea;
      --shadow: 0 18px 50px rgba(53, 66, 50, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      display: grid;
      place-items: center;
      margin: 0;
      background: linear-gradient(145deg, rgba(236, 241, 234, 0.96), rgba(248, 244, 237, 0.95)), var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      letter-spacing: 0;
    }

    main {
      display: grid;
      gap: 18px;
      width: min(520px, calc(100vw - 32px));
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--surface);
      box-shadow: var(--shadow);
      padding: 28px;
      text-align: left;
      backdrop-filter: blur(18px);
    }

    .stage {
      color: var(--accent-strong);
      font-size: 13px;
      font-weight: 750;
    }

    h1,
    p {
      margin: 0;
    }

    h1 {
      font-size: 30px;
      line-height: 1.15;
    }

    p {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: fit-content;
      min-height: 42px;
      border-radius: 999px;
      background: var(--accent);
      color: #ffffff;
      padding: 0 18px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 12px 24px rgba(17, 106, 88, 0.18);
    }

    a:hover {
      background: var(--accent-strong);
    }

    .note {
      border-left: 3px solid var(--accent);
      background: var(--accent-soft);
      padding: 10px 12px;
      color: var(--accent-strong);
      font-size: 13px;
      line-height: 1.55;
    }
  </style>
</head>
<body>
  <main>
    <div class="stage">当前阶段主入口</div>
    <h1>荷小悦 0-1 项目推进器</h1>
    <p>当前只推进定位、产品口径和品牌资料沉淀。复杂经营后台保留，但不作为默认入口。</p>
    <div class="note">默认进入 0-1 验证台：看当前结论、证据缺口、本周验证任务和下一步动作。</div>
    <a href="startup.html">进入 0-1 验证台</a>
  </main>
</body>
</html>
