name: HXY CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Security Gate And Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/hxy-web/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/pip install -r apps/api/requirements.txt

      - name: Install Node dependencies
        run: |
          npm ci
          npm ci --prefix apps/hxy-web

      - name: Install Playwright Chromium
        working-directory: apps/hxy-web
        run: npx playwright install --with-deps chromium

      - name: Secret scan
        run: python3 scripts/check-hxy-secrets.py

      - name: Public release preflight
        run: python3 scripts/check-hxy-public-release.py

      - name: Test
        run: npm test
